<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Chai aur code</h1>
    <button id="start">start</button>
    <button id="stop">Stop</button>
</body>
<script>
    let intervalId
    let newEle = document.createElement("h1")

    let func = function () {
        console.log("hellow");
        let newDate = new Date()
        newEle.innerHTML = newDate.toLocaleTimeString()
        document.body.appendChild(newEle)

    }
    let startbut = document.getElementById("start")
    startbut.addEventListener('click', function () {
        intervalId = setInterval(func, 1000);
     
    })

    let stopbut = document.getElementById("stop")
    stopbut.addEventListener('click', function () {
        clearInterval(intervalId)
    })

</script>

</html>
